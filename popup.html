<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcadeBot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:  #00ff88;
      --red:    #ff3366;
      --dark:   #050e08;
      --panel:  #0a1a0f;
      --border: #1a3a22;
      --dim:    #4a7a58;
    }

    body {
      width: 260px;
      background: var(--dark);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.15) 3px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .header {
      background: linear-gradient(135deg, #0a1a0f 0%, #071209 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 12px;
      text-align: center;
      position: relative;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--green);
      text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.2);
    }

    .sub {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-top: 3px;
    }

    .corner {
      position: absolute;
      width: 8px; height: 8px;
      border-color: var(--green);
      border-style: solid;
      opacity: 0.5;
    }
    .corner.tl { top: 6px; left: 6px;  border-width: 1px 0 0 1px; }
    .corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 6px; left: 6px;  border-width: 0 0 1px 1px; }
    .corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

    .body { padding: 14px 16px; }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      box-shadow: none;
      transition: all 0.3s;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green), 0 0 20px rgba(0,255,136,0.4);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    .status-text {
      font-size: 11px;
      letter-spacing: 1px;
      flex: 1;
    }

    .status-text.active { color: var(--green); }
    .status-text.idle   { color: var(--dim);   }

    .status-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    .status-badge.active { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
    .status-badge.idle   { background: rgba(74,122,88,0.1);  color: var(--dim);   border: 1px solid var(--border); }

    /* Controls info */
    .controls-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .controls-title {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .key-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 5px;
      font-size: 10px;
    }

    .key-row:last-child { margin-bottom: 0; }

    .key {
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--green);
      min-width: 28px;
      text-align: center;
    }

    .key-desc { color: var(--dim); font-size: 10px; }

    /* Main toggle button */
    .btn-toggle {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-toggle.start {
      background: linear-gradient(135deg, #0a2e18 0%, #083a1e 100%);
      color: var(--green);
      border: 1px solid rgba(0,255,136,0.4);
      box-shadow: 0 0 20px rgba(0,255,136,0.1), inset 0 1px 0 rgba(0,255,136,0.1);
    }

    .btn-toggle.start:hover {
      background: linear-gradient(135deg, #0f3d20 0%, #0a4a24 100%);
      box-shadow: 0 0 30px rgba(0,255,136,0.2), inset 0 1px 0 rgba(0,255,136,0.2);
    }

    .btn-toggle.stop {
      background: linear-gradient(135deg, #2e0a14 0%, #3a081a 100%);
      color: var(--red);
      border: 1px solid rgba(255,51,102,0.4);
      box-shadow: 0 0 20px rgba(255,51,102,0.1), inset 0 1px 0 rgba(255,51,102,0.1);
    }

    .btn-toggle.stop:hover {
      background: linear-gradient(135deg, #3d0f1e 0%, #4a0a22 100%);
      box-shadow: 0 0 30px rgba(255,51,102,0.25);
    }

    .btn-toggle:active { transform: scale(0.97); }

    .btn-toggle::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.4s;
    }

    .btn-toggle:hover::before { left: 100%; }

    /* Footer note */
    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.6;
    }

    .brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      color: rgba(0,255,136,0.45);
      letter-spacing: 4px;
      margin-top: 2px;
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px 10px;
      border-top: 1px solid var(--border);
    }

    .social a {
      font-size: 9px;
      color: var(--dim);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .social a:hover { color: var(--green); }
      color: var(--dim);
      letter-spacing: 0.5px;
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="logo">ARCADEBOT</div>
    <div class="sub">AUTONOMOUS SHOOTER v1.0</div>
    <div class="brand">BY .87</div>
  </div>

  <div class="body">

    <div class="status-row">
      <div class="status-dot" id="dot"></div>
      <span class="status-text idle" id="statusText">BOT OFFLINE</span>
      <span class="status-badge idle" id="badge">IDLE</span>
    </div>

    <div class="controls-panel">
      <div class="controls-title">// AUTO CONTROLS</div>
      <div class="key-row">
        <span class="key">A</span>
        <span class="key-desc">Move Left</span>
      </div>
      <div class="key-row">
        <span class="key">D</span>
        <span class="key-desc">Move Right</span>
      </div>
      <div class="key-row">
        <span class="key">SPC</span>
        <span class="key-desc">Shoot — auto-fires every 80ms</span>
      </div>
    </div>

    <button class="btn-toggle start" id="btn">▶ ENGAGE BOT</button>

    <div class="tip" id="tip">
      Bot scans for red enemies via canvas pixels<br>
      and aims at the lowest threat automatically.
    </div>

  </div>

  <div class="footer">
    🎮 &nbsp;KEEP GAME TAB ACTIVE FOR BEST RESULTS
  </div>

  <div class="social">
    <a href="https://x.com/ofalamin" target="_blank">𝕏 @ofalamin</a>
    <span style="color:var(--border)">|</span>
    <a href="https://t.me/Labs87" target="_blank">✈ Labs87</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
